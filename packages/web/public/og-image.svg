<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#111113"/>

  <!-- Corner bracket motif — top-left -->
  <path d="M60 60 L60 120 M60 60 L120 60" stroke="#3F3F46" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Corner bracket motif — top-right -->
  <path d="M1140 60 L1080 60 M1140 60 L1140 120" stroke="#3F3F46" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Corner bracket motif — bottom-left -->
  <path d="M60 570 L60 510 M60 570 L120 570" stroke="#3F3F46" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Corner bracket motif — bottom-right -->
  <path d="M1140 570 L1080 570 M1140 570 L1140 510" stroke="#3F3F46" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Wordmark -->
  <text
    x="600"
    y="290"
    font-family="'Geist Mono', ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="96"
    font-weight="700"
    fill="#F4F4F5"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-3"
  >WYREUP</text>

  <!-- Solder-pad rule below wordmark -->
  <line x1="300" y1="340" x2="888" y2="340" stroke="#27272A" stroke-width="1"/>
  <rect x="888" y="337" width="4" height="4" fill="#FFB000"/>

  <!-- Subtitle -->
  <text
    x="600"
    y="390"
    font-family="'Geist Sans', ui-sans-serif, system-ui, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#A1A1AA"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0"
  >Privacy and productivity. Have both.</text>

  <!-- Bottom tag -->
  <text
    x="600"
    y="490"
    font-family="'Geist Mono', ui-monospace, SFMono-Regular, Consolas, monospace"
    font-size="16"
    font-weight="400"
    fill="#52525B"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
  >wyreup.com</text>
</svg>
