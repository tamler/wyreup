<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <!-- Background -->
  <rect width="800" height="240" fill="#111113"/>

  <!-- Phone silhouette: rounded rectangle -->
  <rect x="60" y="20" width="120" height="200" rx="12" fill="#111113" stroke="#FFB000" stroke-width="1.5"/>
  <!-- Phone top notch area -->
  <line x1="60" y1="50" x2="180" y2="50" stroke="#FFB000" stroke-width="1"/>
  <!-- Phone home area -->
  <line x1="60" y1="192" x2="180" y2="192" stroke="#FFB000" stroke-width="1"/>
  <!-- Home indicator dot -->
  <circle cx="120" cy="210" r="5" fill="none" stroke="#3F3F46" stroke-width="1"/>

  <!-- Phone screen content: wordmark -->
  <text x="120" y="84" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="15" font-weight="700" fill="#FFB000" text-anchor="middle">wyreup</text>

  <!-- Phone screen content: tool list -->
  <!-- Tool row 1 -->
  <rect x="72" y="98" width="96" height="22" rx="2" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <circle cx="84" cy="109" r="3" fill="#FFB000"/>
  <text x="120" y="113" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" fill="#F4F4F5" text-anchor="middle">strip-exif</text>

  <!-- Tool row 2 -->
  <rect x="72" y="126" width="96" height="22" rx="2" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <circle cx="84" cy="137" r="3" fill="#3F3F46"/>
  <text x="120" y="141" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" fill="#F4F4F5" text-anchor="middle">compress</text>

  <!-- Tool row 3 -->
  <rect x="72" y="154" width="96" height="22" rx="2" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <circle cx="84" cy="165" r="3" fill="#3F3F46"/>
  <text x="120" y="169" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" fill="#F4F4F5" text-anchor="middle">merge-pdf</text>

  <!-- Arrow from phone to annotation -->
  <line x1="200" y1="120" x2="244" y2="120" stroke="#3F3F46" stroke-width="1"/>
  <polygon points="244,115 256,120 244,125" fill="#3F3F46"/>

  <!-- Annotation block -->
  <!-- Step 1 -->
  <rect x="268" y="36" width="500" height="52" rx="4" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <!-- solder pad left -->
  <rect x="268" y="59" width="3" height="3" fill="#FFB000"/>
  <text x="284" y="57" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" font-weight="400" fill="#A1A1AA" letter-spacing="0.08em">STEP 1</text>
  <text x="284" y="76" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#F4F4F5">Install from browser. No app store needed.</text>

  <!-- Step 2 -->
  <rect x="268" y="100" width="500" height="52" rx="4" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <rect x="268" y="123" width="3" height="3" fill="#FFB000"/>
  <text x="284" y="121" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" font-weight="400" fill="#A1A1AA" letter-spacing="0.08em">STEP 2</text>
  <text x="284" y="140" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#F4F4F5">Share any file from any app directly to Wyreup.</text>

  <!-- Step 3 -->
  <rect x="268" y="164" width="500" height="52" rx="4" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
  <rect x="268" y="187" width="3" height="3" fill="#FFB000"/>
  <text x="284" y="185" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="10" font-weight="400" fill="#A1A1AA" letter-spacing="0.08em">STEP 3</text>
  <text x="284" y="204" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#F4F4F5">Everything processes locally. Nothing leaves your device.</text>

  <!-- vertical connector between steps -->
  <line x1="270" y1="88" x2="270" y2="100" stroke="#3F3F46" stroke-width="1"/>
  <line x1="270" y1="152" x2="270" y2="164" stroke="#3F3F46" stroke-width="1"/>
</svg>
