<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280">
  <!-- Background -->
  <rect width="1000" height="280" fill="#111113"/>

  <!-- Central CORE node -->
  <rect x="360" y="96" width="280" height="88" rx="4" fill="#27272A" stroke="#FFB000" stroke-width="1"/>
  <!-- corner brackets core -->
  <path d="M366 102 L366 96 L372 96" stroke="#FFB000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M634 96 L640 96 L640 102" stroke="#FFB000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M366 178 L366 184 L372 184" stroke="#FFB000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M634 184 L640 184 L640 178" stroke="#FFB000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="500" y="130" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="13" font-weight="400" fill="#A1A1AA" text-anchor="middle" letter-spacing="0.08em">CORE ENGINE</text>
  <text x="500" y="154" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="16" font-weight="700" fill="#FFB000" text-anchor="middle">@wyreup/core</text>
  <text x="500" y="173" font-family="ui-monospace, 'SF Mono', 'Courier New', monospace" font-size="11" font-weight="400" fill="#52525B" text-anchor="middle">browser + node, dual build</text>

  <!-- === BROWSER destination (top-left) === -->
