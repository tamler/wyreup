name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint + Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so downstream packages can resolve @wyreup/core types.
      # Without this, TS falls back to `any` for cross-package imports and
      # the strict `no-unsafe-*` rules cascade into false-positive errors.
      - run: pnpm build
      - run: pnpm lint:root
      - run: pnpm typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # MCP worker tests fork dist/worker.js — build first so that artifact
      # exists. Without this, `runInWorker` fails to spawn and every worker-
      # dispatched test reports "Tool worker crashed (exit=1, signal=null)".
      - run: pnpm build
      - run: pnpm test

  gdal-node-integration:
    # convert-geo's Node bridge uses a process.chdir() workaround for an
    # upstream gdal3.js bug (see ROADMAP "Tech debt" item 6). chdir is
    # process-global, so vitest's default threaded pool can race with
    # other tests' cwd-relative work. Skipped from `pnpm test`; run it
    # here in a dedicated job where the process is fresh and isolated.
    name: convert-geo Node integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wyreup/core build
      - run: WYREUP_GDAL_NODE=1 pnpm --filter @wyreup/core test convert-geo

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            packages/*/dist
            !packages/*/dist/**/*.map

  isolation-check:
    name: Isolation check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node tools/check-isolation.mjs

  runner-coverage:
    name: Runner coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: node tools/check-runner-coverage.mjs

  doc-references:
    name: Doc references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: node tools/check-doc-references.mjs

  model-allowlist:
    # Verifies every HuggingFace model id referenced by a core tool
    # appears in the wyreup-models Worker's ALLOWED_HF_MODELS set.
    # Without this, a new AI tool would 403 in production after deploy.
    name: Model allowlist sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: node tools/check-model-allowlist.mjs

  privacy-scan:
    name: Privacy scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node tools/check-privacy.mjs

  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node tools/check-bundle-size.mjs

  web-security-invariants:
    # Enforces the non-exploitability claim for GHSA-wrwg-2hg8-v723
    # (Astro reflected XSS via server islands). The advisory affects
    # the `server:defer` directive; wyreup.com is output: 'static'
    # and does not use server islands. This job fails the PR if
    # anyone introduces `server:defer` (or `server:` directives more
    # broadly) so the non-exploitability claim stays true.
    #
    # Flip to a full Astro 4 → 5 + Svelte 4 → 5 migration only when
    # a real driver lands (feature need or advisory affecting a
    # surface we actually use). See SECURITY.md for the rationale.
    name: Web security invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 'Forbid Astro server: directives in web/src'
        run: |
          set -e
          # grep returns exit 1 when there are zero matches — which is what we want.
          # Invert: fail (exit 1 from the job) when ANY match is found.
          if grep -rn 'server:defer\|server-islands\|serverIslands' packages/web/src 2>/dev/null; then
            echo "::error::Astro server: directive found in packages/web/src." \
                 "This re-introduces exposure to GHSA-wrwg-2hg8-v723 (server-island reflected XSS)." \
                 "Either remove the directive OR complete the Astro 5 + Svelte 5 migration first."
            exit 1
          fi
          echo "OK — no Astro server-island directives in packages/web/src."
      - name: "Assert astro.config.mjs keeps output: 'static'"
        run: |
          set -e
          # The grep above is defense-in-depth. The actual invariant that
          # keeps server islands unreachable is `output: 'static'` in
          # astro.config.mjs — Astro builds will refuse server-side
          # features without an SSR adapter when this is set. If the
          # output mode is ever changed to 'server' or 'hybrid', the
          # GHSA-wrwg-2hg8-v723 attack surface re-opens regardless of
          # whether anyone writes server:defer.
          if ! grep -qE "output:\s*['\"]static['\"]" packages/web/astro.config.mjs; then
            echo "::error::packages/web/astro.config.mjs no longer declares output: 'static'." \
                 "This re-opens the GHSA-wrwg-2hg8-v723 attack surface." \
                 "Either restore output: 'static' OR complete the Astro 5 + Svelte 5 migration first."
            exit 1
          fi
          echo "OK — packages/web is output: 'static'."

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # `continue-on-error: true` because the lone HIGH advisory at the
    # time of this commit (GHSA-wrwg-2hg8-v723 — Astro server-island
    # reflected XSS) is non-exploitable for wyreup.com:
    #   - output: 'static' (no SSR runtime)
    #   - no `server:defer` directives anywhere in packages/web/src
    #     (enforced by the web-security-invariants job above)
    # The Astro 5 upgrade would force a Svelte 4 → 5 migration across
    # ~15 client:load components for zero defense-in-depth gain on this
    # specific CVE. See SECURITY.md → "Astro CVE non-exploitability".
    #
    # Future HIGH/CRITICAL advisories still surface in PR checks here
    # for review — they just don't fail the gate. Flip to required
    # once the Astro advisory is patched (i.e. when an Astro 4.x
    # release ships a backport) or once Astro 5 migration is done.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `pnpm audit --prod` exits non-zero on any vulnerability in
      # production dependencies. Dev-only advisories don't block CI
      # because they don't ship to users. `--audit-level=high` gates
      # the build on high+critical only — moderate/low are reported
      # via Dependabot.
      - run: pnpm audit --prod --audit-level=high
