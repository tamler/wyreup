name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # npm OIDC trusted-publishing requires npm >= 11.5.1; Node 20 ships
      # with npm 10. Upgrade so `pnpm changeset publish` shells out to a
      # version that knows how to mint an OIDC id-token for the npm registry.
      # Pinned to the 11 line: npm 12 requires Node >= 22, so @latest
      # self-bricks with EBADENGINE on this job's Node 20.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Auto-merge the changesets release PR as soon as it's mergeable.
      # The PR's diff is purely (1) version bumps + (2) CHANGELOG entries
      # auto-generated from the .changeset/*.md files — the actual code
      # was already reviewed when each source commit landed on main, so
      # there's no second-look value in gating publish behind a manual
      # merge step. Without this, "release notes accumulate for two
      # weeks while npm stays on an old version" is the failure mode
      # (which is exactly how we got here — see CLAUDE.md > Release gate).
      #
      # Try --auto first (queues the merge behind required checks). If the
      # PR is already in CLEAN state (no required checks to wait on),
      # --auto errors with "Pull request is in clean status" — fall back
      # to an immediate squash merge in that case.
      - name: Enable auto-merge on the changesets release PR
        if: steps.changesets.outputs.pullRequestNumber != '' && steps.changesets.outputs.hasChangesets == 'true'
        run: |
          set -e
          PR="${{ steps.changesets.outputs.pullRequestNumber }}"
          gh pr merge --auto --squash "$PR" \
            || gh pr merge --squash "$PR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
