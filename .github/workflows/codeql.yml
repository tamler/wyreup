name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday morning run so advisories that ship after a PR lands
    # still get caught even on quiet weeks.
    - cron: '23 14 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds queries beyond the default pack
          # (taint analysis, more XSS / SQLi / SSRF patterns).
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
